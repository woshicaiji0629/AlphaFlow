services:
  redis:
    image: redis:7.4-alpine
    container_name: alphaflow-redis
    profiles: ["infra", "live"]
    ports:
      - "6380:6380"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--port", "6380", "--appendonly", "yes"]
    restart: unless-stopped

  nats:
    image: nats:2.11-alpine
    container_name: alphaflow-nats
    profiles: ["infra", "live"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./data/nats:/data
    command: ["-js", "-sd", "/data", "-m", "8222"]
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:25.6-alpine
    container_name: alphaflow-clickhouse
    profiles: ["infra", "live", "jobs"]
    environment:
      CLICKHOUSE_DB: alphaflow
      CLICKHOUSE_USER: alphaflow
      CLICKHOUSE_PASSWORD: alphaflow
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./logs/clickhouse:/var/log/clickhouse-server
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: alphaflow-postgres
    profiles: ["infra"]
    environment:
      POSTGRES_DB: alphaflow
      POSTGRES_USER: alphaflow
      POSTGRES_PASSWORD: alphaflow
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  market-data:
    build:
      context: ./backend/go-service
      dockerfile: docker/market-data.Dockerfile
      target: market-data-runtime
    container_name: alphaflow-market-data
    profiles: ["live"]
    depends_on:
      - redis
      - nats
      - clickhouse
    environment:
      ALPHAFLOW_REDIS_ADDR: redis:6380
      ALPHAFLOW_NATS_URL: nats://nats:4222
      ALPHAFLOW_CLICKHOUSE_ADDR: clickhouse:9000
      ALPHAFLOW_CLICKHOUSE_USERNAME: alphaflow
      ALPHAFLOW_CLICKHOUSE_PASSWORD: alphaflow
    volumes:
      - ./logs/go-service:/workspace/logs/go-service
    command: ["market-data", "-config", "configs/market-data.live-top500.toml"]
    restart: unless-stopped

  strategy-engine:
    build:
      context: ./backend/go-service
      dockerfile: docker/market-data.Dockerfile
    container_name: alphaflow-strategy-engine
    profiles: ["live"]
    depends_on:
      - redis
      - nats
      - clickhouse
    environment:
      ALPHAFLOW_REDIS_ADDR: redis:6380
      ALPHAFLOW_NATS_URL: nats://nats:4222
      ALPHAFLOW_CLICKHOUSE_ADDR: clickhouse:9000
      ALPHAFLOW_CLICKHOUSE_USERNAME: alphaflow
      ALPHAFLOW_CLICKHOUSE_PASSWORD: alphaflow
    volumes:
      - ./logs/go-service:/workspace/logs/go-service
    command: ["strategy-engine", "-config", "configs/strategy-engine.local.toml"]
    restart: unless-stopped

  position-engine:
    build:
      context: ./backend/go-service
      dockerfile: docker/market-data.Dockerfile
    container_name: alphaflow-position-engine
    profiles: ["live"]
    depends_on:
      - redis
      - nats
    environment:
      ALPHAFLOW_REDIS_ADDR: redis:6380
      ALPHAFLOW_NATS_URL: nats://nats:4222
    volumes:
      - ./logs/go-service:/workspace/logs/go-service
    command: ["position-engine", "-config", "configs/position-engine.local.toml"]
    restart: unless-stopped

  kline-admin:
    build:
      context: ./backend/go-service
      dockerfile: docker/market-data.Dockerfile
    profiles: ["jobs"]
    depends_on:
      - clickhouse
    environment:
      ALPHAFLOW_CLICKHOUSE_ADDR: clickhouse:9000
      ALPHAFLOW_CLICKHOUSE_USERNAME: alphaflow
      ALPHAFLOW_CLICKHOUSE_PASSWORD: alphaflow
    entrypoint: ["market-data-admin", "--config", "configs/market-data.local.toml"]
