services:
  redis:
    image: redis:7.4-alpine
    container_name: alphaflow-redis
    ports:
      - "6380:6380"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--port", "6380", "--appendonly", "yes"]
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:25.6-alpine
    container_name: alphaflow-clickhouse
    environment:
      CLICKHOUSE_DB: alphaflow
      CLICKHOUSE_USER: alphaflow
      CLICKHOUSE_PASSWORD: alphaflow
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./logs/clickhouse:/var/log/clickhouse-server
    restart: unless-stopped

  market-data:
    build:
      context: ./backend/go-service
      dockerfile: Dockerfile.market-data
    container_name: alphaflow-market-data
    depends_on:
      - redis
      - clickhouse
    environment:
      ALPHAFLOW_REDIS_ADDR: redis:6380
      ALPHAFLOW_CLICKHOUSE_ADDR: clickhouse:9000
      ALPHAFLOW_CLICKHOUSE_USERNAME: alphaflow
      ALPHAFLOW_CLICKHOUSE_PASSWORD: alphaflow
    volumes:
      - ./logs/go-service:/workspace/logs/go-service
    command: ["market-data", "-config", "market-data/configs/live-top500.toml"]
    restart: unless-stopped
