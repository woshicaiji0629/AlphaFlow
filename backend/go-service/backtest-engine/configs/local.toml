[runtime]
run_id = "local-supertrend"
strategy_set = "supertrend"

[data]
exchange = "binance"
market = "um"
symbols = ["ETHUSDT"]
interval = "3m"
confirm_intervals = ["5m", "10m", "15m", "30m"]
start_time = "2026-01-01T00:00:00Z"
end_time = "2026-01-02T00:00:00Z"

[sizing]
initial_equity = 10000
margin_quote = 100
leverage = 100
max_position_size = 1
min_open_confidence = 0.65
disable_short_exposure = false

[fee]
fee_rate = 0.0006
rebate_pct = 0

[clickhouse]
enabled = true
addr = "localhost:9000"
database = "alphaflow"
username = "alphaflow"
password = "alphaflow"
dial_timeout = "5s"
read_timeout = "30s"

[logging]
service = "backtest-engine"
level = "info"
format = "json"
output = "file"
dir = "../../logs/go-service"
filename = "backtest-engine.log"
max_size_mb = 100
max_backups = 10
max_age_days = 30
compress = true
