[binance]
enabled = true
symbols = ["ETHUSDT"]

[gate]
enabled = true
symbols = ["ETH_USDT"]

[bitget]
enabled = false
symbols = ["ETHUSDT"]

[bybit]
enabled = false
symbols = ["ETHUSDT"]

[logging]
service = "market-data"
level = "info"
format = "json"
output = "file"
dir = "../../logs/go-service"
filename = "market-data.log"
max_size_mb = 100
max_backups = 10
max_age_days = 30
compress = true

[websocket]
reconnect_delay = "5s"
