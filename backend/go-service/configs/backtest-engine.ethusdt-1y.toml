[runtime]
run_id = "supertrend-ethusdt-20250711-20260711-baseline"

[strategy]
name = "supertrend"
enabled = true

[strategy.params]
entry_threshold = "0.72"
max_blocking_timeframes = "1"

[data]
exchange = "binance"
market = "um"
symbols = ["ETHUSDT"]
interval = "3m"
confirm_intervals = ["5m", "10m", "15m", "30m"]
warmup_bars = 268
start_time = "2025-07-11T00:00:00Z"
end_time = "2026-07-11T00:00:00Z"

[sizing]
initial_equity = 10000
margin_quote = 100
leverage = 100
max_position_size = 1
min_open_confidence = 0.65
disable_short_exposure = false

[fee]
fee_rate = 0.0006
rebate_pct = 0

[execution]
slippage_bps = 2

[result]
event_batch_size = 1000
trade_batch_size = 1000
report_json_path = "../../logs/go-service/backtest-report-ethusdt-1y-baseline.json"

[[symbol_specs]]
exchange = "binance"
market = "um"
symbol = "ETHUSDT"
quantity_unit = "base"
quantity_step = 0.001
min_quantity = 0.001
min_notional = 5
contract_size = 1

[clickhouse]
enabled = true
addr = "localhost:9000"
database = "alphaflow"
username = "alphaflow"
password = "alphaflow"
dial_timeout = "5s"
read_timeout = "30s"

[logging]
service = "backtest-engine"
level = "info"
format = "json"
output = "file"
dir = "../../logs/go-service"
filename = "backtest-engine-ethusdt-1y.log"
max_size_mb = 100
max_backups = 10
max_age_days = 30
compress = true
