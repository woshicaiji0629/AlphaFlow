[nats]
url = "nats://localhost:4222"

[clickhouse]
enabled = true
addr = "localhost:9000"
database = "alphaflow"
username = "alphaflow"
password = "alphaflow"
dial_timeout = "5s"
read_timeout = "30s"
retry_interval = "10s"
retry_batch = 1000
max_pending = 100000
pending_ack_wait = "30s"
pending_max_deliveries = 5

[backfill_queue]
ack_wait = "30m"
max_deliveries = 3
max_pending = 10000
worker_enabled = true
worker_batch = 1
worker_max_wait = "1s"

[indicator_queue]
enabled = true
ack_wait = "30s"
max_deliveries = 5
max_pending = 100000
worker_batch = 32
worker_max_wait = "1s"
worker_count = 0

[logging]
service = "market-data"
level = "info"
format = "json"
output = "file"
dir = "../../logs/go-service"
filename = "market-data-live-top500.log"
max_size_mb = 100
max_backups = 10
max_age_days = 30
compress = true
