[binance]
enabled = true
symbols = ["ETHUSDT"]

[gate]
enabled = true
symbols = ["ETH_USDT"]

[bitget]
enabled = false
symbols = ["ETHUSDT"]

[bybit]
enabled = false
symbols = ["ETHUSDT"]

[clickhouse]
enabled = true
addr = "localhost:9000"
database = "alphaflow"
username = "alphaflow"
password = "alphaflow"
dial_timeout = "5s"
read_timeout = "30s"
retry_interval = "10s"
retry_batch = 100
max_pending = 100000

[logging]
service = "market-data"
level = "info"
format = "json"
output = "file"
dir = "../../logs/go-service"
filename = "market-data.log"
max_size_mb = 100
max_backups = 10
max_age_days = 30
compress = true
